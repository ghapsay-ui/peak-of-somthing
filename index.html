<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Ultimate Sovereign Pomodoro - System-integrated productivity engine.">
    <meta name="theme-color" content="#e74c3c">
    <title>Pomodoro Pro: Sovereign</title>
    
    <!-- PWA Integration -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2553/2553391.png">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body class="work-mode">
    <!-- Sovereign Pillar: Command Palette (Ctrl+K) -->
    <section id="command-palette" class="overlay hidden" role="combobox" aria-expanded="false" aria-haspopup="listbox">
        <div class="palette-container">
            <input type="text" id="palette-input" placeholder="Type a command... (e.g., 'work 50', 'reset', 'theme dark')" autocomplete="off">
            <div id="palette-results">
                <div class="command-hint">Press <kbd>Enter</kbd> to execute • <kbd>Esc</kbd> to close</div>
            </div>
        </div>
    </section>

    <!-- Psychological Overlays (Retained from V4) -->
    <section id="intention-overlay" class="overlay hidden"></section>
    <section id="breathing-overlay" class="overlay hidden"></section>

    <main id="app">
        <header>
            <h1 class="sr-only">Pomodoro Timer Pro</h1>
            <div id="status-bar">
                <span id="connection-status" title="Offline Mode Ready">●</span>
                <span id="keyboard-hint">Press <kbd>Ctrl</kbd>+<kbd>K</kbd> for Commands</span>
            </div>
        </header>

        <section id="state-indicator">
            <h2 id="current-phase">Focus Session</h2>
            <div id="active-intention-display" class="hidden">
                <span class="label">Target:</span> <span id="current-intention-text"></span>
            </div>
        </section>

        <section id="timer-display">
            <time id="time-left">25:00</time>
            <!-- Sovereign Feature: Audio Visualizer -->
            <canvas id="audio-visualizer"></canvas>
        </section>

        <section id="controls">
            <button id="start-btn" class="primary-btn">Start Session</button>
            <button id="pause-btn" class="secondary-btn" hidden>Pause</button>
            <button id="reset-btn" class="tertiary-btn">Reset</button>
        </section>

        <!-- Sovereign Pillar: Focus Analytics Heatmap -->
        <section id="analytics-dashboard">
            <header>
                <h3>Focus Density (Last 7 Days)</h3>
                <button id="toggle-analytics" type="button">View Stats</button>
            </header>
            <div id="heatmap-container" class="hidden">
                <div class="heatmap-grid" id="focus-heatmap">
                    <!-- Generated by JS -->
                </div>
                <div class="heatmap-legend">
                    <span>Less</span>
                    <div class="cells">
                        <div class="cell level-0"></div>
                        <div class="cell level-1"></div>
                        <div class="cell level-2"></div>
                        <div class="cell level-3"></div>
                    </div>
                    <span>More</span>
                </div>
            </div>
        </section>

        <details id="settings">
            <summary>Advanced Configuration</summary>
            <div class="settings-grid">
                <label>Work <input type="number" id="work-input" value="25"></label>
                <label>Break <input type="number" id="break-input" value="5"></label>
                <label class="full-width">
                    Soundscape
                    <select id="audio-type">
                        <option value="none">None</option>
                        <option value="brown">Brown Noise (Deep Focus)</option>
                        <option value="white">White Noise (Static)</option>
                        <option value="alpha">Alpha Waves (Flow)</option>
                    </select>
                </label>
            </div>
        </details>

        <section id="task-management">
            <h3>Active Tasks</h3>
            <form id="task-form">
                <input type="text" id="task-input" placeholder="Add a task..." required>
            </form>
            <ul id="task-list"></ul>
        </section>

        <footer id="session-tracking">
            <p>Sessions: <span id="session-count">0</span> | Distractions: <span id="distraction-count">0</span></p>
            <button id="clear-progress-btn">Wipe All Data</button>
        </footer>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
